global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rmq01.local:15692
          - rmq02.local:15692
          - rmq03.local:15692

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
