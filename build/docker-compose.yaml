x-rabbitmq: &rabbitmq
  build:
    context: $PWD
    dockerfile: build/Dockerfile.rabbitmq
  restart: unless-stopped
  deploy:
    resources:
      reservations:
        cpus: '0.1'
        memory: 256M
      limits:
        cpus: '2.0'
        memory: 1G
  healthcheck:
    test: rabbitmq-diagnostics -q check_port_connectivity
    start_period: 15s
    start_interval: 10s
    interval: 2s
    timeout: 3s
    retries: 3

services:
  rmq01.local:
    <<: *rabbitmq
    container_name: rmq01.local
    configs:
      - source: rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - source: rabbitmq-definitions-common
        target: /etc/rabbitmq/definitions/common.json
    environment:
      - RABBITMQ_NODENAME=rabbit@rmq01.local
      - RABBITMQ_ERLANG_COOKIE=CONCOOKIE
      - RABBITMQ_USE_LONGNAME=true

  rmq02.local:
    <<: *rabbitmq
    container_name: rmq02.local
    depends_on: [rmq01.local]
    configs:
      - source: rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - source: rabbitmq-definitions-common
        target: /etc/rabbitmq/definitions/common.json
    environment:
      - RABBITMQ_NODENAME=rabbit@rmq02.local
      - RABBITMQ_ERLANG_COOKIE=CONCOOKIE
      - RABBITMQ_USE_LONGNAME=true

  rmq03.local:
    <<: *rabbitmq
    container_name: rmq03.local
    depends_on: [rmq01.local]
    configs:
      - source: rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - source: rabbitmq-definitions-common
        target: /etc/rabbitmq/definitions/common.json
    environment:
      - RABBITMQ_NODENAME=rabbit@rmq03.local
      - RABBITMQ_ERLANG_COOKIE=CONCOOKIE
      - RABBITMQ_USE_LONGNAME=true

  rmq-lb:
    image: haproxy:2.9-alpine
    container_name: rmq-lb
    depends_on:
      - rmq01.local
      - rmq02.local
      - rmq03.local
    ports:
      - "${RMQ_AMQP_PORT:-5672}:5672"
      - "${RMQ_MGMT_PORT:-15672}:15672"
    configs:
      - source: haproxy.cfg
        target: /usr/local/etc/haproxy/haproxy.cfg

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    depends_on:
      - rmq01.local
      - rmq02.local
      - rmq03.local
      - pushgateway
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: pushgateway
    ports:
      - "9091:9091"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  pumba:
    image: ghcr.io/alexei-led/pumba:latest
    container_name: pumba
    network_mode: "service:rmq-lb"
    depends_on:
      - rmq01.local
      - rmq02.local
      - rmq03.local
      - rmq-lb
    command: >
      --log-level=info
      --random
      --interval 45s
      kill --signal SIGTERM re2:rmq0[1-3]\.local
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    restart: always

  pumba_netem:
    image: ghcr.io/alexei-led/pumba:latest
    container_name: pumba_netem
    cap_add:
      - NET_ADMIN
    network_mode: "container:rmq-lb"
    depends_on:
      - rmq-lb
    command: >
      --log-level=info
      --random
      --interval 45s
      netem --duration 30s delay --time 200 --jitter 50 --distribution normal re2:rmq0[1-3]\.local
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    restart: always

configs:
  rabbitmq.conf:
    content: |
      cluster_formation.peer_discovery_backend = classic_config
      cluster_formation.classic_config.nodes.1 = rabbit@rmq01.local
      cluster_formation.classic_config.nodes.2 = rabbit@rmq02.local
      cluster_formation.classic_config.nodes.3 = rabbit@rmq03.local
      cluster_partition_handling = pause_minority
      management.load_definitions = /etc/rabbitmq/definitions
      prometheus.tcp.port = 15692
      prometheus.return_per_object_metrics = true

  rabbitmq-definitions-common:
    content: |-
      {
        "rabbitmq_version": "4.1.1",
      
        "vhosts": [{"name": "/"}],
      
        "users": [{"name": "guest", "password": "guest", "tags": "administrator"}],
      
        "permissions": [{ "user": "guest", "vhost": "/", "configure": ".*", "write": ".*", "read": ".*"}],
      
        "exchanges": [
          {"name": "my_exchange", "vhost": "/", "type": "topic", "durable": true, "auto_delete": false}
        ]
      }

  haproxy.cfg:
    content: |
      global
          maxconn 2048
          daemon

      defaults
          log     global
          option  tcplog
          timeout connect 5s
          timeout client  1m
          timeout server  1m

      frontend amqp_in
          bind *:5672
          mode tcp
          default_backend amqp_cluster

      backend amqp_cluster
          mode tcp
          balance roundrobin
          option  tcp-check
          server rmq01 rmq01.local:5672 check fall 2 rise 3
          server rmq02 rmq02.local:5672 check fall 2 rise 3
          server rmq03 rmq03.local:5672 check fall 2 rise 3

      frontend ui_in
          bind *:15672
          mode http
          option  httplog
          default_backend ui_cluster

      backend ui_cluster
          mode http
          balance roundrobin
          option httpchk GET /
          server rmq01 rmq01.local:15672 check fall 2 rise 3
          server rmq02 rmq02.local:15672 check fall 2 rise 3
          server rmq03 rmq03.local:15672 check fall 2 rise 3
